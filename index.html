<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Only Moving Butterfly</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            overflow: hidden;
            perspective: 1000px;
        }

        /* Container που ελέγχει την κίνηση σε όλη την οθόνη */
        .flight-path {
            position: absolute;
            width: 200px;
            height: 200px;
            left: 0;
            top: 0;
            animation: flyAround 14s infinite linear;
        }

        .butterfly {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(45deg);
        }

        .body {
            position: absolute;
            left: 95px;
            top: 40px;
            width: 10px;
            height: 140px;
            background: #0f3460;
            border-radius: 5px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .body::before, .body::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 2px;
            height: 25px;
            background: #ff4b2b;
            transform-origin: bottom center;
            box-shadow: 0 0 8px rgba(255, 75, 43, 0.8);
        }

        .body::before { left: 2px; transform: rotate(-25deg); }
        .body::after { right: 2px; transform: rotate(25deg); }

        .wing {
            position: absolute;
            top: 20px;
            width: 100px;
            height: 160px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            border-radius: 50% 50% 10% 40%;
            opacity: 0.95;
            box-shadow: 0 0 25px rgba(255, 75, 43, 0.6);
        }

        .left {
            left: 0;
            transform-origin: right center;
            animation: flap-left 0.15s infinite ease-in-out alternate;
        }

        .right {
            right: 0;
            transform-origin: left center;
            border-radius: 50% 50% 40% 10%;
            background: linear-gradient(to left, #ff416c, #ff4b2b);
            animation: flap-right 0.15s infinite ease-in-out alternate;
        }

        @keyframes flap-left {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(75deg); }
        }

        @keyframes flap-right {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-75deg); }
        }

        /* Ομαλή τροχιά κίνησης */
        @keyframes flyAround {
            0% { left: 10%; top: 20%; transform: rotate(0deg); }
            25% { left: 75%; top: 15%; transform: rotate(35deg); }
            50% { left: 65%; top: 70%; transform: rotate(140deg); }
            75% { left: 15%; top: 60%; transform: rotate(240deg); }
            100% { left: 10%; top: 20%; transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="flight-path">
        <div class="butterfly">
            <div class="wing left"></div>
            <div class="body"></div>
            <div class="wing right"></div>
        </div>
    </div>

</body>
</html>
